<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        user-select: none;
    }

    .board {
        position: relative;
        width: 100%;
        max-width: 660px;
        margin: 0 auto;
        padding: 12px 0 16px;
    }

    .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
        align-items: center;
        justify-content: center;
    }

    .ctrl-btn {
        font-size: 12px;
        padding: 5px 12px;
        border: 0.5px solid var(--color-border-secondary);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        border-radius: var(--border-radius-md);
        cursor: pointer;
        transition: background 0.15s;
    }

    .ctrl-btn:hover {
        background: var(--color-background-secondary);
    }

    svg#pitch {
        width: 100%;
        display: block;
        touch-action: none;
    }

    .info-bar {
        text-align: center;
        font-size: 12px;
        color: var(--color-text-tertiary);
        margin-top: 8px;
    }
</style>

<div class="board">
    <h2 class="sr-only">Interactive 7-a-side football tactics board — drag any player or the ball</h2>
    <div class="controls">
        <button class="ctrl-btn" onclick="resetPositions()">↺ Reset</button>
    </div>

    <svg id="pitch" viewBox="0 0 400 560" xmlns="http://www.w3.org/2000/svg">
        <rect width="400" height="560" fill="#2d6a32" />
        <rect x="0" y="0" width="400" height="56" fill="#286030" opacity="0.5" />
        <rect x="0" y="112" width="400" height="56" fill="#286030" opacity="0.5" />
        <rect x="0" y="224" width="400" height="56" fill="#286030" opacity="0.5" />
        <rect x="0" y="336" width="400" height="56" fill="#286030" opacity="0.5" />
        <rect x="0" y="448" width="400" height="56" fill="#286030" opacity="0.5" />
        <rect x="20" y="20" width="360" height="520" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <line x1="20" y1="280" x2="380" y2="280" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <circle cx="200" cy="280" r="42" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <circle cx="200" cy="280" r="2" fill="rgba(255,255,255,0.7)" />
        <rect x="100" y="20" width="200" height="70" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <rect x="150" y="20" width="100" height="25" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <circle cx="200" cy="70" r="2" fill="rgba(255,255,255,0.7)" />
        <rect x="100" y="470" width="200" height="70" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <rect x="150" y="515" width="100" height="25" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <circle cx="200" cy="490" r="2" fill="rgba(255,255,255,0.7)" />
        <path d="M 20 34 A 10 10 0 0 1 34 20" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <path d="M 366 20 A 10 10 0 0 1 380 34" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <path d="M 20 526 A 10 10 0 0 0 34 540" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <path d="M 380 526 A 10 10 0 0 1 366 540" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <rect x="160" y="10" width="80" height="12" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <rect x="160" y="538" width="80" height="12" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" />
        <g id="players-A"></g>
        <g id="players-B"></g>
        <g id="ball-group"></g>
    </svg>
    <div class="info-bar">Drag any player or the ball · Double-click a player to rename</div>
</div>

<script>
    const defaultPositions = {
        A: [[200, 520], [120, 430], [280, 430], [100, 305], [200, 290], [300, 305], [200, 185]],
        B: [[200, 40], [120, 130], [280, 130], [100, 255], [200, 270], [300, 255], [200, 375]]
    };
    const defaultNames = {
        A: ['1 GK', '2 RB', '3 LB', '4 RM', '5 CM', '6 LM', '7 ST'],
        B: ['1 GK', '2 RB', '3 LB', '4 RM', '5 CM', '6 LM', '7 ST']
    };
    const colorA = { fill: '#185FA5', stroke: '#B5D4F4', text: '#fff' };
    const colorB = { fill: '#A32D2D', stroke: '#F7C1C1', text: '#fff' };

    let playerPositions, playerNames;
    let ballPos = [200, 280];

    function deepCopy(o) { return JSON.parse(JSON.stringify(o)); }

    function initPositions() {
        playerPositions = deepCopy(defaultPositions);
        playerNames = deepCopy(defaultNames);
        ballPos = [200, 280];
    }

    function getSVGPoint(clientX, clientY) {
        const svg = document.getElementById('pitch');
        const pt = svg.createSVGPoint();
        pt.x = clientX; pt.y = clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function makeDraggable(el, onMove) {
        el.addEventListener('mousedown', e => {
            e.preventDefault(); e.stopPropagation();
            const move = ev => onMove(ev.clientX, ev.clientY);
            const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up);
        });
        el.addEventListener('touchstart', e => {
            e.preventDefault(); e.stopPropagation();
            const move = ev => { const t = ev.touches[0]; onMove(t.clientX, t.clientY); };
            const end = () => { document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end); };
            document.addEventListener('touchmove', move, { passive: false });
            document.addEventListener('touchend', end);
        }, { passive: false });
    }

    function renderBall() {
        const g = document.getElementById('ball-group');
        g.innerHTML = '';
        const [bx, by] = ballPos;
        const ballG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        ballG.setAttribute('transform', `translate(${bx},${by})`);
        ballG.style.cursor = 'grab';

        const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        shadow.setAttribute('rx', '10'); shadow.setAttribute('ry', '3'); shadow.setAttribute('cy', '12');
        shadow.setAttribute('fill', 'rgba(0,0,0,0.3)');
        ballG.appendChild(shadow);

        const ball = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        ball.setAttribute('r', '10');
        ball.setAttribute('fill', 'white');
        ball.setAttribute('stroke', 'rgba(0,0,0,0.25)');
        ball.setAttribute('stroke-width', '1');
        ballG.appendChild(ball);

        makeDraggable(ballG, (cx, cy) => {
            const pt = getSVGPoint(cx, cy);
            ballPos = [clamp(pt.x, 25, 375), clamp(pt.y, 25, 545)];
            renderBall();
        });

        g.appendChild(ballG);
    }

    function renderTeam(team) {
        const g = document.getElementById('players-' + team);
        g.innerHTML = '';
        const color = team === 'A' ? colorA : colorB;

        playerPositions[team].forEach((pos, i) => {
            const pg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            pg.setAttribute('transform', `translate(${pos[0]},${pos[1]})`);
            pg.style.cursor = 'grab';

            const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
            shadow.setAttribute('rx', '15'); shadow.setAttribute('ry', '4'); shadow.setAttribute('cy', '18');
            shadow.setAttribute('fill', 'rgba(0,0,0,0.25)');
            pg.appendChild(shadow);

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('r', '17');
            circle.setAttribute('fill', color.fill);
            circle.setAttribute('stroke', color.stroke);
            circle.setAttribute('stroke-width', '2');
            pg.appendChild(circle);

            const label = playerNames[team][i];
            const parts = label.split(' ');
            const num = parts[0], abbr = parts.slice(1).join(' ');

            const numText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            numText.setAttribute('text-anchor', 'middle');
            numText.setAttribute('dy', abbr ? '-1' : '5');
            numText.setAttribute('fill', color.text);
            numText.setAttribute('font-size', abbr ? '11' : '13');
            numText.setAttribute('font-weight', '500');
            numText.setAttribute('font-family', 'var(--font-sans, sans-serif)');
            numText.textContent = num;
            pg.appendChild(numText);

            if (abbr) {
                const abbrText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                abbrText.setAttribute('text-anchor', 'middle'); abbrText.setAttribute('dy', '9');
                abbrText.setAttribute('fill', color.text); abbrText.setAttribute('font-size', '7.5');
                abbrText.setAttribute('font-family', 'var(--font-sans, sans-serif)');
                abbrText.setAttribute('opacity', '0.85');
                abbrText.textContent = abbr;
                pg.appendChild(abbrText);
            }

            makeDraggable(pg, (cx, cy) => {
                const pt = getSVGPoint(cx, cy);
                playerPositions[team][i] = [clamp(pt.x, 25, 375), clamp(pt.y, 25, 545)];
                renderTeam(team);
            });

            pg.addEventListener('dblclick', () => {
                const newName = prompt('Rename player (e.g. "7 Kane"):', playerNames[team][i]);
                if (newName && newName.trim()) { playerNames[team][i] = newName.trim(); renderTeam(team); }
            });

            g.appendChild(pg);
        });
    }

    function render() { renderTeam('A'); renderTeam('B'); renderBall(); }
    function resetPositions() { initPositions(); render(); }

    initPositions();
    render();
</script>
